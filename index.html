<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spin for Goddess — @kemithegod</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Bebas+Neue&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #c9a84c; --gold-light: #e8c97a; --cream: #f5ede0;
    --dark: #0c0a0f; --dark2: #16121e; --rose: #b85c7a; --muted: #6b5f7a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark); color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; overflow-x: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(184,92,122,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 20% 60%, rgba(107,95,122,0.1) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 200px 200px;
    pointer-events: none; z-index: 0; opacity: 0.4;
  }
  #nameGate {
    position: fixed; inset: 0; z-index: 100; display: flex;
    align-items: center; justify-content: center; background: var(--dark);
    flex-direction: column; padding: 40px 24px; text-align: center;
    transition: opacity 0.5s ease;
  }
  #nameGate.fade-out { opacity: 0; pointer-events: none; }
  .gate-handle { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.3em; font-size: 12px; color: var(--gold); opacity: 0.7; margin-bottom: 16px; }
  .gate-title { font-size: clamp(2.4rem, 10vw, 4rem); font-weight: 300; font-style: italic; color: var(--cream); line-height: 1; margin-bottom: 6px; }
  .gate-title span { color: var(--gold-light); font-weight: 600; }
  .gate-sub { font-size: 15px; font-weight: 300; font-style: italic; color: var(--muted); margin-bottom: 36px; }
  .gate-divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 0 auto 36px; }
  .gate-label { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.25em; font-size: 11px; color: var(--muted); margin-bottom: 12px; }
  #nameInput {
    background: rgba(22,18,30,0.9); border: 1px solid rgba(201,168,76,0.3); border-radius: 2px;
    color: var(--cream); font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300;
    text-align: center; padding: 14px 24px; width: min(320px, 90vw); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; letter-spacing: 0.05em;
  }
  #nameInput::placeholder { color: rgba(107,95,122,0.5); font-style: italic; }
  #nameInput:focus { border-color: rgba(201,168,76,0.7); box-shadow: 0 0 0 3px rgba(201,168,76,0.08); }
  #enterBtn {
    margin-top: 20px; width: min(320px, 90vw); padding: 14px; background: transparent;
    border: 1px solid var(--gold); color: var(--gold-light); font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 0.3em; cursor: pointer; border-radius: 2px;
    transition: background 0.2s, box-shadow 0.2s;
  }
  #enterBtn:hover { background: rgba(201,168,76,0.1); box-shadow: 0 0 24px rgba(201,168,76,0.2); }
  .container { position: relative; z-index: 1; width: 100%; max-width: 700px; padding: 0 20px 80px; display: flex; flex-direction: column; align-items: center; }
  .header { text-align: center; padding: 36px 0 18px; }
  .handle { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.25em; font-size: 12px; color: var(--gold); opacity: 0.65; margin-bottom: 6px; }
  .greeting { font-size: 13px; font-weight: 300; font-style: italic; color: var(--muted); margin-bottom: 6px; }
  .greeting span { color: var(--gold-light); font-style: normal; }
  .title { font-size: clamp(2rem, 8vw, 3.4rem); font-weight: 300; font-style: italic; line-height: 1; color: var(--cream); }
  .title span { color: var(--gold-light); font-weight: 600; }
  .divider { width: 70px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 14px auto; }
  .subtitle { font-size: 14px; font-weight: 300; color: var(--muted); font-style: italic; letter-spacing: 0.06em; }
  .wheel-wrap {
    position: relative; width: min(540px, 96vw); height: min(540px, 96vw); margin: 16px auto 0;
    filter: drop-shadow(0 0 50px rgba(201,168,76,0.2)) drop-shadow(0 12px 50px rgba(0,0,0,0.7));
  }
  .pointer {
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%); z-index: 10;
    width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent;
    border-top: 34px solid var(--gold); filter: drop-shadow(0 0 10px var(--gold));
  }
  canvas { width: 100%; height: 100%; border-radius: 50%; display: block; }
  .spin-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 80px; height: 80px; border-radius: 50%; background: var(--dark);
    border: 2.5px solid var(--gold); color: var(--gold-light);
    font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 0.1em;
    cursor: pointer; z-index: 20; transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    box-shadow: 0 0 0 6px rgba(201,168,76,0.08), inset 0 0 16px rgba(201,168,76,0.06); outline: none;
  }
  .spin-btn:hover:not(:disabled) { background: rgba(201,168,76,0.12); box-shadow: 0 0 0 8px rgba(201,168,76,0.15), 0 0 30px rgba(201,168,76,0.3); transform: translate(-50%, -50%) scale(1.06); }
  .spin-btn:active:not(:disabled) { transform: translate(-50%, -50%) scale(0.97); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .result-card {
    margin-top: 30px; width: 100%; border: 1px solid rgba(201,168,76,0.25);
    background: rgba(22,18,30,0.85); backdrop-filter: blur(12px); border-radius: 3px;
    padding: 24px 32px; text-align: center; opacity: 0; transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease; position: relative; overflow: hidden;
  }
  .result-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .result-card.visible { opacity: 1; transform: translateY(0); }
  .result-label { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.3em; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .result-name { font-size: 14px; font-style: italic; color: var(--muted); margin-bottom: 4px; }
  .result-amount { font-size: clamp(3rem, 13vw, 5rem); font-weight: 600; color: var(--gold-light); line-height: 1; letter-spacing: -0.02em; text-shadow: 0 0 40px rgba(201,168,76,0.45); }
  .result-copy { margin-top: 12px; font-size: 17px; font-weight: 300; font-style: italic; color: var(--cream); opacity: 0.85; line-height: 1.4; }
  .spin-again { margin-top: 14px; display: inline-block; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.2em; font-size: 11px; color: var(--muted); cursor: pointer; border-bottom: 1px solid rgba(107,95,122,0.35); padding-bottom: 2px; transition: color 0.2s; }
  .spin-again:hover { color: var(--gold); }
  .log-section { width: 100%; margin-top: 40px; }
  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .log-title { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.3em; font-size: 12px; color: var(--gold); opacity: 0.8; }
  .log-clear { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.15em; font-size: 10px; color: var(--muted); opacity: 0.5; cursor: pointer; transition: opacity 0.2s, color 0.2s; border: none; background: none; padding: 0; }
  .log-clear:hover { opacity: 1; color: var(--rose); }
  .log-empty { font-size: 14px; font-style: italic; color: var(--muted); opacity: 0.4; text-align: center; padding: 20px 0; }
  .log-list { display: flex; flex-direction: column; gap: 8px; }
  .log-entry { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; border: 1px solid rgba(201,168,76,0.1); border-radius: 2px; background: rgba(22,18,30,0.6); animation: fadeSlide 0.4s ease forwards; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .log-entry-left { display: flex; flex-direction: column; gap: 2px; }
  .log-sub-name { font-size: 16px; font-weight: 600; color: var(--cream); }
  .log-time { font-size: 11px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.15em; color: var(--muted); opacity: 0.6; }
  .log-amount { font-size: 22px; font-weight: 600; color: var(--gold-light); letter-spacing: -0.01em; text-shadow: 0 0 20px rgba(201,168,76,0.3); }
  .log-amount.big { color: #ff9fd0; text-shadow: 0 0 20px rgba(255,159,208,0.4); }
  .footer { margin-top: 50px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.3em; font-size: 11px; color: var(--muted); opacity: 0.4; text-align: center; }
  @keyframes shimmer { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  .spinning .spin-btn { animation: shimmer 0.5s ease infinite; }
</style>
</head>
<body>

<div id="nameGate">
  <div class="gate-handle">@kemithegod</div>
  <h1 class="gate-title">Spin for <span>Goddess</span></h1>
  <p class="gate-sub">let's play a game.</p>
  <div class="gate-divider"></div>
  <div class="gate-label">identify yourself.</div>
  <input id="nameInput" type="text" placeholder="enter your name" maxlength="30" autocomplete="off" />
  <button id="enterBtn" onclick="enterWheel()">ENTER &rarr;</button>
</div>

<div class="container" id="mainApp" style="display:none">
  <header class="header">
    <div class="handle">@kemithegod</div>
    <div class="greeting">spinning as <span id="greetName"></span></div>
    <h1 class="title">Spin for <span>Goddess</span></h1>
    <div class="divider"></div>
    <p class="subtitle">let's play a game.</p>
  </header>

  <div class="wheel-wrap" id="wheelWrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="700" height="700"></canvas>
    <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-label">YOUR TRIBUTE</div>
    <div class="result-name" id="resultName"></div>
    <div class="result-amount" id="resultAmount">$0</div>
    <div class="result-copy" id="resultCopy"></div>
    <div class="spin-again" onclick="resetSpin()">&#8617; spin again</div>
  </div>

  <div class="log-section">
    <div class="log-header">
      <div class="log-title">&#9889; Spin Log</div>
      <button class="log-clear" onclick="clearLog()">CLEAR ALL</button>
    </div>
    <div class="log-empty" id="logEmpty">no spins yet. don't be shy.</div>
    <div class="log-list" id="logList"></div>
  </div>

  <footer class="footer">kemithegod &middot; pay or pray</footer>
</div>

<script>
  const JSONBIN_KEY = '$2a$10$NWeTz1kyTPPz2E4brtb3gejPhvO3sa.5f.nOfnh8hZBEEOikpQiE2';
  const BIN_ID_KEY  = 'kemithegod_binid';
  let cachedLog = null;

  async function getBinId() {
    let id = localStorage.getItem(BIN_ID_KEY);
    if (id) return id;
    const res = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY, 'X-Bin-Name': 'kemithegod-spinlog' },
      body: JSON.stringify({ log: [] })
    });
    const data = await res.json();
    id = data.metadata.id;
    localStorage.setItem(BIN_ID_KEY, id);
    return id;
  }

  async function loadLog() {
    try {
      const id  = await getBinId();
      const res = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, { headers: { 'X-Master-Key': JSONBIN_KEY } });
      const data = await res.json();
      cachedLog = data.record.log || [];
    } catch(e) { cachedLog = []; }
    renderLog();
  }

  async function saveLog() {
    try {
      const id = await getBinId();
      await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
        body: JSON.stringify({ log: cachedLog })
      });
    } catch(e) { console.error('Save failed', e); }
  }

  async function addLogEntry(name, amount) {
    if (!cachedLog) cachedLog = [];
    cachedLog.unshift({ name, amount, time: Date.now() });
    renderLog();
    await saveLog();
  }

  async function clearLog() {
    if (confirm('Clear the entire spin log?')) {
      cachedLog = [];
      await saveLog();
      renderLog();
    }
  }

  let currentName = '';

  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') enterWheel();
  });

  function enterWheel() {
    const val = document.getElementById('nameInput').value.trim();
    if (!val) { document.getElementById('nameInput').focus(); document.getElementById('nameInput').style.borderColor = 'rgba(184,92,122,0.7)'; return; }
    currentName = val;
    document.getElementById('greetName').textContent = val;
    const gate = document.getElementById('nameGate');
    gate.classList.add('fade-out');
    setTimeout(() => {
      gate.style.display = 'none';
      document.getElementById('mainApp').style.display = 'flex';
      loadLog();
      drawWheel(currentAngle);
    }, 500);
  }

  const palette = ['#b5d4e8','#c9a2bc','#8dc8a0','#e8c47a','#d97fa0','#9dabd4','#e8a87a','#b8d4a0','#a8c8d8','#d4a8c0','#98d0a8','#dcc880'];
  const vals = [66,77,99,111,123,150,200,222,250,333];
  const segments = [];
  for (let pass = 0; pass < 3; pass++) vals.forEach((v,i) => segments.push({ value: v, color: palette[i] }));

  const copies = {
    66:  ["devil number. fitting.","$66 and you're already sweating.","chaos energy. pay up."],
    77:  ["lucky for you. not your wallet.","$77. she notices.","that's the vibe."],
    99:  ["so close to triple digits. adorable.","$99. almost impressive.","one dollar away from respect."],
    111: ["angel number. you're welcome.","$111 and she smiles. briefly.","divine timing."],
    123: ["sequential tribute. orderly. i approve.","$123. step it up.","progression is cute."],
    150: ["now we're talking.","$150. this is what devotion looks like.","halfway to really impressing me."],
    200: ["$200. say less.","finally, some seriousness.","no notes."],
    222: ["222. goddess tier confirmed.","$222. you earned one nod.","the knowing number."],
    250: ["a quarter thousand. respectable.","$250. she felt that.","not bad, little one."],
    333: ["triple threes. you felt called.","$333. she's paying attention now.","significant."],
  };

  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const numSeg = segments.length;
  const arc = (2 * Math.PI) / numSeg;
  let currentAngle = -Math.PI / 2;
  let spinning = false;

  function drawWheel(angle) {
    const cx = canvas.width/2, cy = canvas.height/2, r = cx - 8;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.beginPath(); ctx.arc(cx,cy,r+6,0,2*Math.PI); ctx.fillStyle='#1a1424'; ctx.fill();
    ctx.strokeStyle='rgba(201,168,76,0.4)'; ctx.lineWidth=2; ctx.stroke();
    segments.forEach((seg,i) => {
      const s=angle+i*arc, e=s+arc;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,s,e); ctx.closePath();
      ctx.fillStyle=seg.color; ctx.globalAlpha=i%2===0?1:0.78; ctx.fill(); ctx.globalAlpha=1;
      ctx.strokeStyle='rgba(12,10,15,0.55)'; ctx.lineWidth=1.2; ctx.stroke();
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(s+arc/2);
      ctx.textAlign='right'; ctx.fillStyle='rgba(20,14,28,0.9)';
      const fs=Math.round(canvas.width*0.038);
      ctx.font=`bold ${fs}px "Bebas Neue", sans-serif`;
      ctx.fillText('$'+seg.value,r-14,6); ctx.restore();
    });
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,60);
    grad.addColorStop(0,'#201a2e'); grad.addColorStop(1,'#0c0a0f');
    ctx.beginPath(); ctx.arc(cx,cy,60,0,2*Math.PI); ctx.fillStyle=grad; ctx.fill();
    ctx.strokeStyle='rgba(201,168,76,0.55)'; ctx.lineWidth=2.5; ctx.stroke();
  }

  function spin() {
    if (spinning) return;
    spinning=true; hideResult();
    document.getElementById('spinBtn').disabled=true;
    document.getElementById('wheelWrap').classList.add('spinning');
    const extraSpins=7+Math.floor(Math.random()*5);
    const randomSegment=Math.floor(Math.random()*numSeg);
    const segCenter=-Math.PI/2-(randomSegment*arc+arc/2);
    const targetAngle=extraSpins*2*Math.PI+((segCenter-currentAngle)%(2*Math.PI)+4*Math.PI)%(2*Math.PI);
    const duration=4200+Math.random()*1500;
    const startAngle=currentAngle, startTime=performance.now();
    function easeOut(t){return 1-Math.pow(1-t,4);}
    function animate(now){
      const t=Math.min((now-startTime)/duration,1);
      currentAngle=startAngle+targetAngle*easeOut(t);
      drawWheel(currentAngle);
      if(t<1){requestAnimationFrame(animate);}
      else{spinning=false; document.getElementById('spinBtn').disabled=false; document.getElementById('wheelWrap').classList.remove('spinning'); showResult(randomSegment);}
    }
    requestAnimationFrame(animate);
  }

  function showResult(segIndex) {
    const seg=segments[segIndex], pool=copies[seg.value], line=pool[Math.floor(Math.random()*pool.length)];
    document.getElementById('resultName').textContent=currentName+', your tribute:';
    document.getElementById('resultAmount').textContent='$'+seg.value;
    document.getElementById('resultCopy').textContent=line;
    document.getElementById('resultCard').classList.add('visible');
    addLogEntry(currentName, seg.value);
  }

  function hideResult(){document.getElementById('resultCard').classList.remove('visible');}
  function resetSpin(){hideResult();}

  function formatTime(ts){
    const d=new Date(ts);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  }

  function renderLog(){
    const log=cachedLog||[];
    const emptyEl=document.getElementById('logEmpty'), listEl=document.getElementById('logList');
    listEl.innerHTML='';
    if(log.length===0){emptyEl.style.display='block';return;}
    emptyEl.style.display='none';
    log.forEach(entry=>{
      const div=document.createElement('div');
      div.className='log-entry';
      div.innerHTML=`<div class="log-entry-left"><div class="log-sub-name">${entry.name}</div><div class="log-time">${formatTime(entry.time)}</div></div><div class="log-amount ${entry.amount>=333?'big':''}">$${entry.amount}</div>`;
      listEl.appendChild(div);
    });
  }
</script>
</body>
</html>
